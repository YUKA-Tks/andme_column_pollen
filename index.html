<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>花粉・バリアコラム | ＆me</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ac:#2E7D52;--acl:#E8F5EE;--acm:#81C784;--acd:#1A5C38;
  --text:#102818;--t2:#2A5A3A;
  --sur:#fff;--cream:#F5FBF7;--bdr:rgba(0,0,0,0.08);
  --r:16px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);line-height:1.8}
.hero{background:linear-gradient(135deg,#1A5C38 0%,#2E7D52 50%,#81C784 100%);padding:24px 20px 18px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'🌸';position:absolute;font-size:150px;opacity:.07;top:-10px;right:-10px;pointer-events:none}
.hero-logo{font-family:'Cormorant Garamond',serif;font-size:16px;color:rgba(255,255,255,.65);letter-spacing:.22em;margin-bottom:4px}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:#fff;letter-spacing:.06em;margin-bottom:2px}
.hero-sub{font-size:11px;color:rgba(255,255,255,.72);letter-spacing:.1em}
.wrap{max-width:560px;margin:0 auto;padding:12px 14px 40px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 12px;justify-content:center}
.tab{padding:7px 13px;border-radius:20px;border:1px solid var(--bdr);background:var(--sur);font-size:11px;color:var(--t2);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:500}
.tab:hover:not(.active){border-color:var(--acm);background:var(--acl)}
.col-section{display:none}
.col-section.active{display:block}
.img-wrap{width:100%;border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.img-wrap img{width:100%;display:block}
.reserve-box{display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(135deg,var(--acl) 0%,#fff 60%,var(--acl) 100%);border:1.5px solid var(--acm);border-radius:var(--rs);padding:10px 14px;margin-top:12px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.reserve-box-left{display:flex;align-items:center;gap:8px}
.reserve-box-icon{font-size:20px;flex-shrink:0}
.reserve-box-text p{font-size:10px;color:var(--ac);letter-spacing:.1em;font-weight:500}
.reserve-box-text h3{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--text);letter-spacing:.02em}
.reserve-btn{flex-shrink:0;padding:8px 16px;background:linear-gradient(135deg,var(--acd),var(--ac));color:#fff;border:none;border-radius:20px;font-size:11px;cursor:pointer;letter-spacing:.04em;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.12);font-family:'Noto Sans JP',sans-serif}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-logo">＆me Skin Care Column</div>
  <div class="hero-title">🌸 花粉・バリアコラム</div>
  <div class="hero-sub">花粉・バリア機能・敏感肌ケアのすべて</div>
</div>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="show(0)">① 花粉と肌荒れ</button>
    <button class="tab" onclick="show(1)">② バリア機能とは</button>
    <button class="tab" onclick="show(2)">③ 敏感肌の洗顔</button>
    <button class="tab" onclick="show(3)">④ 外的刺激対策</button>
    <button class="tab" onclick="show(4)">⑤ 抗炎症成分</button>
    <button class="tab" onclick="show(5)">⑥ 食事と腸内環境</button>
  </div>
  <div class="col-section active" id="col-0">
    <div class="img-wrap"><img src="https://raw.githubusercontent.com/YUKA-Tks/andme_column_pollen/main/%26me%E3%82%B3%E3%83%B3%E3%83%86%E3%83%B3%E3%83%84_%E3%82%B3%E3%83%A9%E3%83%A0%E7%94%BB%E5%83%8F%E8%8A%B1%E7%B2%89%E2%91%A0.png" alt="コラム1"></div>
  </div>
  <div class="col-section" id="col-1">
    <div class="img-wrap"><img src="https://raw.githubusercontent.com/YUKA-Tks/andme_column_pollen/main/%26me%E3%82%B3%E3%83%B3%E3%83%86%E3%83%B3%E3%83%84_%E3%82%B3%E3%83%A9%E3%83%A0%E7%94%BB%E5%83%8F%E8%8A%B1%E7%B2%89%E2%91%A1.png" alt="コラム2"></div>
  </div>
  <div class="col-section" id="col-2">
    <div class="img-wrap"><img src="https://raw.githubusercontent.com/YUKA-Tks/andme_column_pollen/main/%26me%E3%82%B3%E3%83%B3%E3%83%86%E3%83%B3%E3%83%84_%E3%82%B3%E3%83%A9%E3%83%A0%E7%94%BB%E5%83%8F%E8%8A%B1%E7%B2%89%E2%91%A2.png" alt="コラム3"></div>
  </div>
  <div class="col-section" id="col-3">
    <div class="img-wrap"><img src="https://raw.githubusercontent.com/YUKA-Tks/andme_column_pollen/main/%26me%E3%82%B3%E3%83%B3%E3%83%86%E3%83%B3%E3%83%84_%E3%82%B3%E3%83%A9%E3%83%A0%E7%94%BB%E5%83%8F%E8%8A%B1%E7%B2%89%E2%91%A3.png" alt="コラム4"></div>
  </div>
  <div class="col-section" id="col-4">
    <div class="img-wrap"><img src="https://raw.githubusercontent.com/YUKA-Tks/andme_column_pollen/main/%26me%E3%82%B3%E3%83%B3%E3%83%86%E3%83%B3%E3%83%84_%E3%82%B3%E3%83%A9%E3%83%A0%E7%94%BB%E5%83%8F%E8%8A%B1%E7%B2%89%E2%91%A4.png" alt="コラム5"></div>
  </div>
  <div class="col-section" id="col-5">
    <div class="img-wrap"><img src="https://raw.githubusercontent.com/YUKA-Tks/andme_column_pollen/main/%26me%E3%82%B3%E3%83%B3%E3%83%86%E3%83%B3%E3%83%84_%E3%82%B3%E3%83%A9%E3%83%A0%E7%94%BB%E5%83%8F%E8%8A%B1%E7%B2%89%E2%91%A5.png" alt="コラム6"></div>
  </div>
  <div class="reserve-box" onclick="alert('予約URLをここに設定してください')">
    <div class="reserve-box-left">
      <span class="reserve-box-icon">🌸</span>
      <div class="reserve-box-text">
        <p>SALON RESERVATION</p>
        <h3>ご予約はこちらから</h3>
      </div>
    </div>
    <button class="reserve-btn">予約する →</button>
  </div>
</div>
<script>
function show(i){
  document.querySelectorAll('.col-section').forEach((s,idx)=>s.classList.toggle('active',idx===i));
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
